<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grill Gurus BBQ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo-flame {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 3rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ff6b00;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.2rem;
      color: #cccccc;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }
    .badge {
      background: #ff6b00;
      color: #0d0d0d;
      font-weight: bold;
      padding: 0.75rem 2rem;
      border-radius: 4px;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      display: inline-block;
    }
    .description {
      max-width: 500px;
      color: #aaaaaa;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .store-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 3rem;
    }
    .store-btn {
      border: 2px solid #ff6b00;
      color: #ff6b00;
      padding: 0.6rem 1.5rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    footer {
      color: #555555;
      font-size: 0.8rem;
      margin-top: auto;
      padding-top: 2rem;
    }
    a { color: #ff6b00; }
  </style>
</head>
<body>
  <div class="logo-flame">&#x1F525;</div>
  <h1>Grill Gurus BBQ</h1>
  <p class="tagline">Real BBQ. Real Flavor. Coming to You.</p>
  <span class="badge">Mobile App — Coming Soon</span>
  <p class="description">
    Track the Grill Gurus food truck in real time, get notified when we go live,
    and never miss a Lamb Saturday again. Download the app to stay in the loop.
  </p>
  <div class="store-links">
    <a class="store-btn" href="#">App Store</a>
    <a class="store-btn" href="#">Google Play</a>
  </div>
  <footer>
    &copy; 2026 Grill Gurus BBQ &mdash; <a href="mailto:info@grillgurusbbq.com">Contact Us</a>
  </footer>
</body>
</html>
